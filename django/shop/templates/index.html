<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная | Интернет-магазин</title>
    <link rel="stylesheet" href="{% static 'index.css' %}">
    <link rel="stylesheet" href="{% static 'product_card.css' %}">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/" class="logo">Интернет-магазин</a>
            <ul class="nav-menu">
                <li><a href="/">Главная</a></li>
                <li><a href="#">О нас</a></li>
                <li><a href="#">Контакты</a></li>
            </ul>
            <div class="header-icons">
                <span>🔍</span>
                <span><a href="/bucket/" style="text-decoration: none;">🛒</a></span>
            </div>
        </div>
    </header>

    <main>
        <h1 class="page-title">Рекомендуемые товары</h1>
        <div class="product-grid">
            
            {% for product in products %}
                {% include "product_card.html" with product=product %}
            {% endfor %}
            
        </div>
    </main>
    <div class="loading-spinner" id="loading-spinner" style="display: none; text-align: center; padding: 20px;">
        <div class="spinner"></div>
        <p>Загрузка...</p>
    </div>
    <div id="no-more-products" style="display: none; text-align: center; padding: 20px; color: #666;">
        Товары закончились
    </div>

    <script>
        let currentPage = 1;
        let loading = false;
        let hasNextPage = true;

        async function loadMoreProducts() {
            if (loading || !hasNextPage) return;
            
            loading = true;
            document.getElementById('loading-spinner').style.display = 'block';
            
            try {
                const response = await fetch(`/load-more-products/?page=${currentPage}`);
                const data = await response.json();
                
                if (data.products.length > 0) {
                    appendProducts(data.products);
                    currentPage++;
                    hasNextPage = data.has_next;
                } else {
                    hasNextPage = false;
                }
                
                if (!hasNextPage) {
                    document.getElementById('no-more-products').style.display = 'block';
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            } finally {
                loading = false;
                document.getElementById('loading-spinner').style.display = 'none';
            }
        }

        function appendProducts(products) {
            const productGrid = document.querySelector('.product-grid');
            
            products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                const inBucketClass = product.in_bucket ? 'in-cart' : '';
                const buttonText = product.in_bucket ? '✓ В корзине' : 'В корзину';
                productCard.innerHTML = `
                    <div class="product-image">
                        <a href="/product/${product.id}">
                            <img style="max-width:100%" src="${product.image_url}" alt="${product.Name}">
                        </a>
                    </div>
                    <div class="product-info">
                        <a href="/product/${product.id}" style="text-decoration: none;">
                            <div class="product-name">${product.Name}</div>
                        </a>
                        <div class="product-price">₽${product.Cost}</div>
                        <form method="POST" action="/add_to_bucket/${product.id}_1" class="add-to-cart-form" id="add-to-cart-form-${product.id}">
                            <input type="hidden" name="csrfmiddlewaretoken" value="${document.querySelector('[name=csrfmiddlewaretoken]').value}">
                            <button type="button" class="btn-add-to-cart ${inBucketClass}" id="btn-${product.id}" onclick="addToCart(${product.id}, this)">${buttonText}</button>
                        </form>
                    </div>
                `;
                productGrid.appendChild(productCard);
            });
        }

        function addToCart(productId, buttonElement) {
            if (buttonElement.classList.contains('in-cart')) {
                return; 
            }
            buttonElement.classList.add('in-cart');
            buttonElement.textContent = '✓ В корзине';
            
            fetch(`/add_to_bucket/${productId}_1`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                },
            })
            .then(response => {
                if (!response.ok) {
                    buttonElement.classList.remove('in-cart');
                    buttonElement.textContent = 'В корзину';
                    console.error('Ошибка при добавлении в корзину');
                }
            })
            .catch(error => {
                buttonElement.classList.remove('in-cart');
                buttonElement.textContent = 'В корзину';
                console.error('Ошибка:', error);
            });
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        window.addEventListener('scroll', debounce(() => {
            if (loading || !hasNextPage) return;
            
            const scrollPosition = window.innerHeight + window.scrollY;
            const threshold = document.documentElement.scrollHeight - 1000;
            
            if (scrollPosition >= threshold) {
                loadMoreProducts();
            }
        }, 200));
    </script>
</body>
</html>
