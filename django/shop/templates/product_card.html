<div class="product-card">
    <div class="product-image">
        <a href="/product/{{ product.id }}">
            <img style="max-width:100%" src="{{ product.image_url }}" alt="{{ product.Name }}">
        </a>
    </div>
    <div class="product-info">
        <a href="/product/{{ product.id }}" style="text-decoration: none;">
            <div class="product-name">{{ product.Name }}</div>
        </a>
        <div class="price-rating">
            <div class="product-price">₽{{ product.Cost }}</div>
            {% if product.Rating != -1 %}
                <div class="product-rating" style="color: {{ product.rating_color }};">★{{ product.Rating }}</div>
            {% endif %}
        </div>
        <form method="POST" action="/add_to_bucket/{{ product.id }}_1/" class="add-to-cart-form" id="add-to-cart-form-{{ product.id }}">
            {% csrf_token %}
            <button type="button"
                    class="btn-add-to-cart{% if product.id|stringformat:'d' in bucket %} in-cart{% endif %}"
                    id="btn-{{ product.id }}"
                    onclick="addToCart({{ product.id }}, this)">
                {% if product.id|stringformat:'d' in bucket %}✓ В корзине{% else %}В корзину{% endif %}
            </button>
        </form>
    </div>
</div>
